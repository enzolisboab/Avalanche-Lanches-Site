<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="robots" content="noindex" />
    <title>Painel Avalanche</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body data-page="admin">
    <div class="noise" aria-hidden="true"></div>
    <div class="cinema-bars" aria-hidden="true"></div>

    <div class="loader" id="loader" role="status" aria-live="polite">
      <div class="loader-smoke"></div>
      <div class="loader-brand">
        <span class="brand-mark">AVALANCHE</span>
        <span class="brand-sub">Painel do dono</span>
      </div>
      <p>Carregando pedidos...</p>
      <div class="loader-line"><span></span></div>
    </div>

    <header class="topbar">
      <a class="mini-brand" href="index.html" aria-label="Voltar para loja">
        <span>AV</span>
        <strong>Avalanche</strong>
      </a>
    </header>

    <main class="admin-main">
      <section class="admin-section" id="admin">
        <div class="admin-header">
          <div>
            <p class="kicker">painel do dono</p>
            <h1>Central de pedidos</h1>
          </div>
          <div class="admin-tools">
            <button class="tool-btn" id="soundToggle" type="button">Som ON</button>
            <select id="paperSize" aria-label="Tamanho do cupom">
              <option value="80">80mm</option>
              <option value="58">58mm</option>
            </select>
          </div>
        </div>
        <div class="admin-metrics" id="adminMetrics"></div>
        <div class="orders-board" id="ordersBoard"></div>
      </section>
    </main>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>
    <div class="thermal-receipt" id="thermalReceipt" aria-hidden="true"></div>

    <script src="app.js?v=5" defer></script>
  </body>
</html>
